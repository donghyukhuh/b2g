<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>맞춤형 나라장터 입찰정보</title>
  <style>
    :root { --bg:#0b1020; --card:#121a33; --text:#eaf0ff; --muted:#9fb0d8; --accent:#67d2ff; --ok:#28c76f; --warn:#ffb020; }
    *{box-sizing:border-box} body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:linear-gradient(180deg,#0b1020,#0d1430);color:var(--text)}
    .wrap{max-width:1280px;margin:0 auto;padding:24px}
    h1{margin:0 0 6px;font-size:28px} .subtitle{color:var(--muted);margin-bottom:20px}
    .card{background:var(--card);border:1px solid #243159;border-radius:12px;padding:16px;margin-bottom:16px}
    .toolbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
    input,button{border-radius:8px;border:1px solid #2f4275;background:#0e1730;color:var(--text);padding:10px 12px}
    button{cursor:pointer;background:#15234a} button:hover{filter:brightness(1.1)}
    .chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
    .chip{display:inline-flex;align-items:center;gap:6px;background:#1a2954;border:1px solid #304f93;padding:6px 10px;border-radius:999px}
    .chip button{padding:2px 6px;border-radius:999px;border-color:#506fb6}
    .status{font-size:13px;color:var(--muted)} .status .ok{color:var(--ok)} .status .warn{color:var(--warn)}
    h2{font-size:20px;margin:8px 0 12px}
    table{width:100%;border-collapse:collapse;font-size:14px}
    th,td{padding:10px;border-bottom:1px solid #243159;vertical-align:top}
    th{text-align:left;color:#bad2ff;font-weight:600}
    a{color:var(--accent)}
    .meta{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;color:var(--muted);font-size:13px;margin-bottom:8px}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>맞춤형 나라장터 입찰정보</h1>
    <div class="subtitle">제작 : 임팩트브랜딩커뮤니티 (주)로셜리티</div>

    <section class="card">
      <div class="toolbar">
        <strong>키워드 관리</strong>
        <input id="kwInput" placeholder="키워드 입력 후 추가" />
        <button id="addKw">추가</button>
        <button id="refresh">새로고침</button>
      </div>
      <div id="chipBox" class="chips"></div>
      <p class="status" id="statusText">업데이트 기준: 한국시간 매일 오전 8시 자동 갱신 + 수동 새로고침 가능</p>
    </section>

    <section class="card">
      <div class="meta"><h2>사전규격 검색</h2><span id="preCnt"></span></div>
      <table><thead><tr><th>공고명</th><th>금액</th><th>공고기관</th><th>입찰마감일시</th><th>파일첨부문서</th></tr></thead><tbody id="preRows"></tbody></table>
    </section>

    <section class="card">
      <div class="meta"><h2>입찰공고 검색</h2><span id="bidCnt"></span></div>
      <table><thead><tr><th>공고명</th><th>금액</th><th>공고기관</th><th>입찰마감일시</th><th>파일첨부문서</th></tr></thead><tbody id="bidRows"></tbody></table>
    </section>

    <section class="card">
      <div class="meta"><h2>가격입찰 검색 (낙찰하한율)</h2><span id="lowCnt"></span></div>
      <table><thead><tr><th>공고명</th><th>금액</th><th>공고기관</th><th>입찰마감일시</th><th>파일첨부문서</th></tr></thead><tbody id="lowRows"></tbody></table>
    </section>
  </div>

<script>
const API_KEY = '45dd6772b86a0a8c153347fcff4f16f6df199aabbd2a4dd7bada3f3fa1739314';
const DEFAULT_KEYWORDS = ['로컬','문화','연구','청년','창업','지역','상권','기본계획','운영','활성화'];
const ALLOWED_REGIONS = ['서울','경기','전국'];
const STORAGE_KEY='nara_keywords';

const ENDPOINTS = {
  pre: 'https://apis.data.go.kr/1230000/ad/BidPublicInfoService/getBidPblancListInfoServcPPSSrch',
  bid: 'https://apis.data.go.kr/1230000/ad/BidPublicInfoService/getBidPblancListInfoServcPPSSrch',
  low: 'https://apis.data.go.kr/1230000/ad/BidPublicInfoService/getBidPblancListInfoServcPPSSrch'
};

const $ = (id)=>document.getElementById(id);
let keywords = JSON.parse(localStorage.getItem(STORAGE_KEY)||'null') || DEFAULT_KEYWORDS;

function renderKeywords(){
  const box=$('chipBox'); box.innerHTML='';
  keywords.forEach((kw,i)=>{
    const chip=document.createElement('div'); chip.className='chip';
    chip.innerHTML=`<span>${kw}</span><button data-i="${i}">X</button>`;
    box.appendChild(chip);
  });
  box.querySelectorAll('button').forEach(btn=>btn.onclick=()=>{keywords.splice(+btn.dataset.i,1); saveAndRefresh();});
}

function saveAndRefresh(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(keywords)); renderKeywords(); runAll(); }

function containsKeyword(title=''){ return keywords.some(kw => title.includes(kw)); }
function allowedRegion(txt=''){ return ALLOWED_REGIONS.some(r => txt.includes(r)); }

function rowHtml(r){
  const title=r.bidNtceNm||r.prdctClsfcNoNm||r.bsnsDivNm||'-';
  const amount=r.asignBdgtAmt||r.presmptPrce||r.bidNtceAmt||'-';
  const org=r.ntceInsttNm||r.dminsttNm||'-';
  const close=r.bidClseDt||r.opengDt||r.ntceDt||'-';
  const fileLink=r.bidNtceDtlUrl||r.ntceSpecDocUrl1||r.ntceSpecDocUrl2||'';
  return `<tr><td>${title}</td><td>${amount}</td><td>${org}</td><td>${close}</td><td>${fileLink?`<a href="${fileLink}" target="_blank" rel="noopener">다운로드</a>`:'-'}</td></tr>`;
}

function parseItems(obj){
  const raw = obj?.response?.body?.items || obj?.response?.body?.item || [];
  if (Array.isArray(raw)) return raw;
  if (raw && Array.isArray(raw.item)) return raw.item;
  if (raw && typeof raw === 'object') return [raw];
  return [];
}

async function fetchSection(type){
  const url=new URL(ENDPOINTS[type]);
  url.searchParams.set('serviceKey', API_KEY);
  url.searchParams.set('numOfRows', '100');
  url.searchParams.set('pageNo', '1');
  url.searchParams.set('type', 'json');
  const res=await fetch(url);
  if(!res.ok) throw new Error(`${type} ${res.status}`);
  const data=await res.json();
  let items=parseItems(data);

  items=items.filter(x=>{
    const title=x.bidNtceNm||x.prdctClsfcNoNm||x.bsnsDivNm||'';
    const regionText=[x.rgnLmtYnNm,x.rgnLmtCdNm,x.rgnNm,x.dtlRgnNm,x.cntrctCnclsMthdNm].filter(Boolean).join(' ');
    const lowText=[x.sucsfbidLwltRt,x.cntrctCnclsMthdNm,x.bidQlfctRgstDt].filter(Boolean).join(' ');
    if(!containsKeyword(title)) return false;
    if(!allowedRegion(regionText)) return false;
    if(type==='low') return /(낙찰하한율|제한적 최저가|최저가)/.test(lowText);
    if(type==='pre') return /(사전규격|규격공개)/.test(title + ' ' + (x.bsnsDivNm||''));
    return true;
  }).slice(0,10);

  return items;
}

async function renderSection(type, rowsId, cntId){
  const tbody=$(rowsId), cnt=$(cntId);
  tbody.innerHTML='<tr><td colspan="5">로딩중...</td></tr>';
  try{
    const rows=await fetchSection(type);
    tbody.innerHTML=rows.length?rows.map(rowHtml).join(''):'<tr><td colspan="5">조건에 맞는 결과가 없습니다.</td></tr>';
    cnt.innerHTML=`표시 ${rows.length}건 (최대 10건)`;
  }catch(e){
    tbody.innerHTML=`<tr><td colspan="5">조회 실패: ${e.message}</td></tr>`;
    cnt.innerHTML='';
  }
}

function isKorea8am(){
  const now=new Date();
  const kst= new Date(now.toLocaleString('en-US',{timeZone:'Asia/Seoul'}));
  return kst.getHours()===8;
}

async function runAll(){
  $('statusText').innerHTML=`업데이트 기준: 한국시간 매일 오전 8시 자동 갱신 + 수동 새로고침 가능 ${isKorea8am()?'<span class="ok">(현재 KST 08시대)</span>':''}`;
  await Promise.all([
    renderSection('pre','preRows','preCnt'),
    renderSection('bid','bidRows','bidCnt'),
    renderSection('low','lowRows','lowCnt')
  ]);
}

$('addKw').onclick=()=>{ const v=$('kwInput').value.trim(); if(v&&!keywords.includes(v)){ keywords.push(v); $('kwInput').value=''; saveAndRefresh(); } };
$('refresh').onclick=runAll;

renderKeywords();
runAll();
setInterval(()=>{ if(isKorea8am()) runAll(); }, 60*1000);
</script>
</body>
</html>
