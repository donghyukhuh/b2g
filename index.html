<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로셜리티 입찰검색 대시보드</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="top">
    <div class="top-inner">
      <div>
        <h1>로셜리티 입찰검색 대시보드</h1>
        <p>제작: 임팩트브랜딩커뮤니티 (주)로셜리티</p>
      </div>
      <span id="statusBadge" class="status-badge"></span>
    </div>
  </header>

  <main>
    <section class="panel">
      <h2>키워드 설정</h2>
      <div class="keyword-input-wrap">
        <input id="keywordInput" type="text" placeholder="키워드 입력 후 추가 (Enter)" />
        <button id="addKeywordBtn">추가</button>
        <button id="refreshBtn">지금 새로고침</button>
      </div>
      <div id="keywordChips" class="chips"></div>
      <p class="hint">
        데이터는 GitHub Actions가 하루 3회 자동 수집합니다 (08:00 / 14:00 / 20:00 KST).<br>
        새 키워드를 자동 수집에 포함하려면 <code>data/keywords.json</code>에 추가하세요.
      </p>
    </section>

    <section class="panel">
      <h2>검색결과 (입찰공고 목록)</h2>
      <p id="lastUpdated" class="hint">최근 갱신: -</p>
      <div id="results"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
