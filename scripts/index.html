<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>나라장터 대시보드</title>
</head>
<body>
  <h1>입찰정보 대시보드</h1>
  <div id="content"></div>

  <script>
    fetch('data/results.json')
      .then(res => res.json())
      .then(data => {
        let html = `<p>업데이트: ${data.updated}</p>`;

        ["pre","bid","low"].forEach(section => {
          html += `<h2>${section}</h2>`;
          html += "<table border='1'><tr><th>공고명</th><th>기관</th><th>마감</th></tr>";

          data[section].forEach(i => {
            html += `<tr>
              <td><a href="${i.link}" target="_blank">${i.title}</a></td>
              <td>${i.org}</td>
              <td>${i.deadline}</td>
            </tr>`;
          });

          html += "</table>";
        });

        document.getElementById("content").innerHTML = html;
      });
  </script>
</body>
</html>
